<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta http-equiv="X-UA-Compatible" content="ie=edge"/>
    <title>Flowers - Login</title>
    <link rel="stylesheet" href="css/forms.css"/>
    <link rel="icon shortcut" href="images/logo.png">
</head>
<body>
    <div class="background login">
        <div class="shape-login"></div>
        <div class="shape-login"></div>
    </div>
    <form>
        <h3>Login</h3>

        <label for="username">Username</label>
        <input type="text" placeholder="Email or Phone" id="username" required>

        <label for="password">Password</label>
        <input type="password" placeholder="Password" id="password" required>

        <button>Log In</button>
        <footer class="noaccount">No account ? <a href="/register">Create one !</a></footer>
    </form>
</body>
</html>
